<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Connected</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
  <div class="text-center">
    <p class="text-lg font-medium text-green-400">Spotify connected.</p>
    <p class="text-sm text-gray-400 mt-1">You can close this window.</p>
  </div>
  <script>
    if (window.opener) {
      window.opener.postMessage('spotify-auth-complete', window.location.origin);
      window.close();
    }
  </script>
</body>
</html>
