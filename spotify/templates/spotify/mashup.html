{% load spotify_extras %}

<!-- Explore Tracks modal -->
<div id="mashup-explorer-modal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-start justify-center pt-8 px-4 pb-4">
  <div class="bg-gray-900 border border-gray-800 rounded-xl w-full max-w-[1400px] flex flex-col" style="max-height: calc(100vh - 4rem)">
    <!-- Modal header -->
    <div class="flex items-center justify-between px-5 py-3 border-b border-gray-800 flex-shrink-0">
      <h3 class="text-sm font-semibold text-gray-200">Explore Tracks</h3>
      <button onclick="closeMashupExplorer()"
        class="text-gray-500 hover:text-gray-200 transition-colors p-1 rounded hover:bg-gray-800">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <!-- 3-column explorer -->
    <div class="flex gap-0 flex-1 overflow-hidden p-4" id="mashup-root">

      <!-- Slot 1: left track column (37.5%) -->
      <div class="flex flex-col" style="width:37.5%">
        <div class="relative mb-3 pr-3">
          <input
            id="slot-1-search"
            type="text"
            placeholder="Search for a track…"
            autocomplete="off"
            oninput="mashupSearch(1, this.value)"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm placeholder-gray-500 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500"
          >
          <div id="slot-1-results" class="absolute z-20 top-full left-0 right-3 mt-1"></div>
        </div>
        <div id="slot-1-panel" class="flex-1 bg-gray-900 border border-gray-800 rounded-xl overflow-y-auto mr-3">
          <div class="flex items-center justify-center h-48 text-gray-600 text-sm">
            Search for a track above
          </div>
        </div>
      </div>

      <!-- Compat column (25%) -->
      <div class="flex flex-col" style="width:25%">
        <div class="mb-3 h-9"></div><!-- spacer matching search input height -->
        <div id="compat-panel" class="flex-1 border border-gray-800 rounded-xl overflow-y-auto">
          <div class="flex items-center justify-center h-48 text-gray-600 text-xs text-center px-4">
            Select two tracks to see compatibility
          </div>
        </div>
      </div>

      <!-- Slot 2: right track column (37.5%) -->
      <div class="flex flex-col" style="width:37.5%">
        <div class="relative mb-3 pl-3">
          <input
            id="slot-2-search"
            type="text"
            placeholder="Search for a track…"
            autocomplete="off"
            oninput="mashupSearch(2, this.value)"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm placeholder-gray-500 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500"
          >
          <div id="slot-2-results" class="absolute z-20 top-full left-3 right-0 mt-1"></div>
        </div>
        <div id="slot-2-panel" class="flex-1 bg-gray-900 border border-gray-800 rounded-xl overflow-y-auto ml-3">
          <div class="flex items-center justify-center h-48 text-gray-600 text-sm">
            Search for a track above
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Main view: saved pairs -->
<div class="flex items-center justify-between mb-5">
  <h2 class="text-base font-semibold text-white">Saved Mashups</h2>
  <button onclick="openMashupExplorer()"
    class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium bg-green-700 hover:bg-green-600 text-white transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    Explore tracks
  </button>
</div>

<div id="mashup-pairs-container"
  hx-get="{% url 'mashup_pairs' %}"
  hx-trigger="load"
  hx-swap="innerHTML">
  <div class="text-gray-600 text-sm text-center py-8">Loading…</div>
</div>

<script>
(function() {
  var _slot1Id = '';
  var _slot2Id = '';
  var _debounceTimers = {};

  window.openMashupExplorer = function() {
    document.getElementById('mashup-explorer-modal').classList.remove('hidden');
  };

  window.closeMashupExplorer = function() {
    document.getElementById('mashup-explorer-modal').classList.add('hidden');
    // Refresh pairs table in case new pairs were saved
    htmx.ajax('GET', '{% url "mashup_pairs" %}', {
      target: '#mashup-pairs-container',
      swap: 'innerHTML'
    });
  };

  // Close on backdrop click
  document.getElementById('mashup-explorer-modal').addEventListener('click', function(e) {
    if (e.target === this) closeMashupExplorer();
  });

  // Dismiss search results when clicking outside
  document.addEventListener('click', function(e) {
    [1, 2].forEach(function(slot) {
      var results = document.getElementById('slot-' + slot + '-results');
      var input = document.getElementById('slot-' + slot + '-search');
      if (results && input && !results.contains(e.target) && e.target !== input) {
        results.innerHTML = '';
      }
    });
  });

  window.mashupSearch = function(slot, q) {
    clearTimeout(_debounceTimers[slot]);
    var resultsEl = document.getElementById('slot-' + slot + '-results');
    if (!q.trim()) { resultsEl.innerHTML = ''; return; }
    _debounceTimers[slot] = setTimeout(function() {
      htmx.ajax('GET', '{% url "mashup_search" %}?slot=' + slot + '&q=' + encodeURIComponent(q), {
        target: '#slot-' + slot + '-results',
        swap: 'innerHTML'
      });
    }, 300);
  };

  window.selectTrack = function(slot, trackId, trackName) {
    document.getElementById('slot-' + slot + '-search').value = trackName;
    document.getElementById('slot-' + slot + '-results').innerHTML = '';

    if (slot == 1) _slot1Id = trackId;
    else _slot2Id = trackId;

    htmx.ajax('GET', '{% url "mashup_track_detail" track_id="__ID__" %}'.replace('__ID__', trackId), {
      target: '#slot-' + slot + '-panel',
      swap: 'innerHTML'
    });

    if (_slot1Id && _slot2Id) {
      htmx.ajax('GET', '{% url "mashup_compat" %}?t1=' + _slot1Id + '&t2=' + _slot2Id, {
        target: '#compat-panel',
        swap: 'innerHTML'
      });
    }
  };

  // Sync compat header height to match track panel headers after each swap
  function syncCompatLayout() {
    var h1 = document.querySelector('#slot-1-panel .mashup-header');
    var h2 = document.querySelector('#slot-2-panel .mashup-header');
    var compHead = document.getElementById('compat-score-section');
    if (!compHead || (!h1 && !h2)) return;
    var maxH = Math.max(h1 ? h1.offsetHeight : 0, h2 ? h2.offsetHeight : 0);
    if (maxH > 0) compHead.style.minHeight = maxH + 'px';
  }

  document.body.addEventListener('htmx:afterSwap', function(e) {
    var id = e.detail.target && e.detail.target.id;
    if (id === 'slot-1-panel' || id === 'slot-2-panel' || id === 'compat-panel') {
      setTimeout(syncCompatLayout, 30);
    }
  });

  // Pre-fill both slots from a pair stashed by a track's mashup suggestions list.
  window.consumeMashupPair = function() {
    var raw = sessionStorage.getItem('mashupPair');
    if (!raw) return;
    sessionStorage.removeItem('mashupPair');
    var p = JSON.parse(raw);
    openMashupExplorer();
    selectTrack(1, p[0], p[1]);
    selectTrack(2, p[2], p[3]);
  };
  consumeMashupPair();
})();
</script>
