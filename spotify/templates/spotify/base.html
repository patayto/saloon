<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saloon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/force-graph@1.51.4/dist/force-graph.min.js"></script>
  <style>
    .htmx-indicator { opacity: 0; transition: opacity 150ms ease-in; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased">
  <script>
    // Send CSRF token with every HTMX request
    document.addEventListener('htmx:configRequest', function(e) {
      e.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
  </script>
  {% block content %}{% endblock %}
</body>
</html>
