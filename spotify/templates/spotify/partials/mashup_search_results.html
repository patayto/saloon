{% if tracks %}
<div class="bg-gray-800 border border-gray-700 rounded-lg shadow-xl overflow-hidden">
  {% for track in tracks %}
  <button
    type="button"
    onclick="selectTrack({{ slot }}, '{{ track.id }}', '{{ track.name|escapejs }}')"
    class="w-full px-3 py-2 text-left text-sm hover:bg-gray-700 transition-colors {% if not forloop.last %}border-b border-gray-700{% endif %}"
  >
    <div class="text-gray-100 truncate">{{ track.name }}</div>
    <div class="text-xs text-gray-400 truncate">
      {% for artist in track.artists.all %}{{ artist.name }}{% if not forloop.last %}, {% endif %}{% endfor %}
    </div>
  </button>
  {% endfor %}
</div>
{% elif q %}
<div class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-500">
  No tracks found for "{{ q }}"
</div>
{% endif %}
