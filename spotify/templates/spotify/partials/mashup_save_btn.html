<div id="mashup-save-btn">
  {% if saved %}
  <span class="inline-flex items-center gap-1 text-xs text-green-400 font-medium">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    Saved
  </span>
  {% else %}
  <form hx-post="{% url 'mashup_save_pair' %}" hx-target="#mashup-save-btn" hx-swap="outerHTML" hx-include="this">
    {% csrf_token %}
    <input type="hidden" name="t1" value="{{ t1 }}">
    <input type="hidden" name="t2" value="{{ t2 }}">
    <button type="submit"
      class="inline-flex items-center gap-1 px-2.5 py-1 rounded text-xs font-medium bg-green-900/40 text-green-300 hover:bg-green-900/70 border border-green-800 transition-colors">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
      Save pair
    </button>
  </form>
  {% endif %}
</div>
